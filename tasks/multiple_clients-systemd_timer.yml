---
# lego_acme-client/tasks/multiple_clients-systemd_timer.yml

- name: Create the systemd service file
  ansible.builtin.template:
    src: lego_certificate_renew.service.j2
    dest: "{{ systemd_unit_path }}/lego_certificate_renew-{{ item['name'] }}.service"
    owner: root
    group: root
    mode: '0644'
  notify:
    - Trigger systemctl daemon-reload

- name: Create the systemd timer file
  ansible.builtin.template:
    src: lego_certificate_renew.timer.j2
    dest: "{{ systemd_unit_path }}/lego_certificate_renew-{{ item['name'] }}.timer"
    owner: root
    group: root
    mode: '0644'
  notify:
    - Trigger systemctl daemon-reload
