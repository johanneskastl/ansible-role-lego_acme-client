---
# lego_acme-client/tasks/main.yml

- name: Define path to lego binary
  ansible.builtin.set_fact:
    path_to_lego: "{{ path_to_install_to }}/lego"
  when:
    - path_to_lego is undefined

- name: Download binary
  ansible.builtin.include_tasks: download_binary.yml
  tags:
    - installation
  when:
    - download_binary | bool

- name: Create the environment file
  ansible.builtin.include_tasks: create_environment_file.yml
  tags:
    - environment_file

#
# old configuration with only one client
#

- name: Single client - Make sure the lego_path directory exists
  ansible.builtin.include_tasks: create_lego_path_directory.yml
  tags:
    - lego_path_directory
  when:
    - lego_path is defined

- name: Single client - Create helper script
  ansible.builtin.include_tasks: create_helper_script.yml
  tags:
    - helper_script
  when:
    - lego_list_of_clients is undefined

- name: Single client - Create config file
  ansible.builtin.include_tasks: create_config_file.yml
  tags:
    - config_file
  when:
    - create_lego_config_file | bool
    - lego_list_of_clients is undefined

- name: Single client - Create systemd timer for certificate renewal
  ansible.builtin.include_tasks: systemd_timer.yml
  tags:
    - systemd_timer
  when:
    - lego_list_of_clients is undefined

- name: Single client - Enable and start the systemd timer for certificate renewal
  ansible.builtin.service:
    name: lego_certificate_renew.timer
    state: started
    enabled: true
  tags:
    - systemd_timer
  when:
    - enable_lego_renew_timer | bool
    - lego_list_of_clients is undefined

#
# new configuration with lego_list_of_clients
#

- name: Multiple clients - Make sure the lego_path directory exists
  ansible.builtin.include_tasks: multiple_clients-create_lego_path_directory.yml
  tags:
    - lego_path_directory
  when:
    - lego_list_of_clients is defined
  loop: "{{ lego_list_of_clients }}"

- name: Multiple clients - Create config file
  ansible.builtin.include_tasks: multiple_clients-create_config_file.yml
  tags:
    - config_file
  when:
    - lego_list_of_clients is defined
    - item['create_lego_config_file'] | bool
  loop: "{{ lego_list_of_clients }}"

- name: Multiple clients - Create the helper scripts
  ansible.builtin.include_tasks: multiple_clients-create_helper_script.yml
  tags:
    - helper_script
  when:
    - lego_list_of_clients is defined
  loop: "{{ lego_list_of_clients }}"

- name: Multiple clients - Create systemd timer for certificate renewal
  ansible.builtin.include_tasks: multiple_clients-systemd_timer.yml
  tags:
    - systemd_timer
  when:
    - lego_list_of_clients is defined
  loop: "{{ lego_list_of_clients }}"

- name: Multiple clients - Enable and start the systemd timer for certificate renewal
  ansible.builtin.include_tasks: multiple_clients-enable_the_systemd_timer.yml
  tags:
    - systemd_timer
  when:
    - lego_list_of_clients is defined
    - item['enable_lego_renew_timer'] | bool
  loop: "{{ lego_list_of_clients }}"
